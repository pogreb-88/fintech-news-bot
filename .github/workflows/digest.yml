name: digest

on:
  schedule:
    # Morning Prague window (09:00-11:00 CEST = 07:00-09:00 UTC) — every 30 min
    - cron: "0 7 * * *"
    - cron: "30 7 * * *"
    - cron: "0 8 * * *"
    - cron: "30 8 * * *"
    - cron: "0 9 * * *"
    # Evening Prague window (17:00-19:00 CEST = 15:00-17:00 UTC) — every 30 min
    - cron: "0 15 * * *"
    - cron: "30 15 * * *"
    - cron: "0 16 * * *"
    - cron: "30 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: bot-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main digest

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: state-${{ github.run_id }}
