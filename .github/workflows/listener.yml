name: listener

# Long-poll loop. Each invocation runs ~25 min; cron fires every 30 min so
# there's near-continuous coverage. Concurrency keeps only one listener at a
# time. Public repo => unlimited Actions minutes.
on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LISTENER_MAX_SECONDS: "1500"   # 25 min — exit before 30-min cron fires

concurrency:
  group: bot-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run listener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main listen

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: state-${{ github.run_id }}
