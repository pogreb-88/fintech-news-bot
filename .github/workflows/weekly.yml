name: weekly

on:
  schedule:
    # Monday morning Prague (09:00-11:00 CEST = 07:00-09:00 UTC) — every 30 min
    - cron: "0 7 * * 1"
    - cron: "30 7 * * 1"
    - cron: "0 8 * * 1"
    - cron: "30 8 * * 1"
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: bot-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run weekly digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main weekly

      - name: Commit state
        run: |
          git config user.name "fintech-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "state: weekly run"
          git push
